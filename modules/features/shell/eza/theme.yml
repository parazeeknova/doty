filekinds:
  normal:
    foreground: "#e2e2e9"
  directory:
    foreground: "#adc6ff"
    is_bold: true
  symlink:
    foreground: "#bfc6dc"
    is_italic: true
  pipe:
    foreground: "#c4c6d0"
  block_device:
    foreground: "#debcdf"
  char_device:
    foreground: "#debcdf"
  socket:
    foreground: "#debcdf"
  special:
    foreground: "#debcdf"
  executable:
    foreground: "#adc6ff"
    is_bold: true
  mount_point:
    foreground: "#ffb4ab"
    is_bold: true

perms:
  user_read:
    foreground: "#adc6ff"
  user_write:
    foreground: "#debcdf"
  user_execute_file:
    foreground: "#adc6ff"
  user_execute_other:
    foreground: "#adc6ff"
  group_read:
    foreground: "#debcdf"
  group_write:
    foreground: "#debcdf"
  group_execute:
    foreground: "#debcdf"
  other_read:
    foreground: "#c4c6d0"
  other_write:
    foreground: "#c4c6d0"
  other_execute:
    foreground: "#c4c6d0"
  special_user_file:
    foreground: "#adc6ff"
    is_bold: true
  special_other:
    foreground: "#adc6ff"
    is_bold: true
  attribute:
    foreground: "#bfc6dc"

size:
  major:
    foreground: "#adc6ff"
    is_bold: true
  minor:
    foreground: "#c4c6d0"
  number_byte:
    foreground: "#debcdf"
  number_kilo:
    foreground: "#debcdf"
  number_mega:
    foreground: "#adc6ff"
  number_giga:
    foreground: "#adc6ff"
  number_huge:
    foreground: "#adc6ff"
    is_bold: true
  unit_byte:
    foreground: "#c4c6d0"
  unit_kilo:
    foreground: "#c4c6d0"
  unit_mega:
    foreground: "#c4c6d0"
  unit_giga:
    foreground: "#c4c6d0"
  unit_huge:
    foreground: "#c4c6d0"

users:
  user_you:
    foreground: "#adc6ff"
    is_bold: true
  user_root:
    foreground: "#ffb4ab"
    is_bold: true
  user_other:
    foreground: "#e2e2e9"
  group_yours:
    foreground: "#adc6ff"
  group_other:
    foreground: "#c4c6d0"
  group_root:
    foreground: "#ffb4ab"

links:
  normal:
    foreground: "#bfc6dc"
  multi_link_file:
    foreground: "#bfc6dc"
    is_bold: true

git:
  new:
    foreground: "#adc6ff"
  modified:
    foreground: "#debcdf"
  deleted:
    foreground: "#ffb4ab"
  renamed:
    foreground: "#bfc6dc"
  ignored:
    foreground: "#c4c6d0"
  conflicted:
    foreground: "#ffb4ab"
    is_bold: true

git_repo:
  branch_main:
    foreground: "#adc6ff"
  branch_other:
    foreground: "#debcdf"
  git_clean:
    foreground: "#adc6ff"
  git_dirty:
    foreground: "#debcdf"

security_context:
  none:
    foreground: "#c4c6d0"
  selinux:
    colon:
      foreground: "#c4c6d0"
    user:
      foreground: "#bfc6dc"
    role:
      foreground: "#debcdf"
    typ:
      foreground: "#adc6ff"
    range:
      foreground: "#bfc6dc"

file_type:
  image:
    foreground: "#bfc6dc"
    is_italic: true
  video:
    foreground: "#bfc6dc"
  music:
    foreground: "#debcdf"
  crypto:
    foreground: "#adc6ff"
  document:
    foreground: "#e2e2e9"
  compressed:
    foreground: "#ffb4ab"
  temp:
    foreground: "#c4c6d0"
  compiled:
    foreground: "#debcdf"
  build:
    foreground: "#adc6ff"
    is_underline: true
  source:
    foreground: "#adc6ff"

punctuation:
  foreground: "#c4c6d0"

date:
  foreground: "#c4c6d0"

inode:
  foreground: "#44474f"

blocks:
  foreground: "#adc6ff"

header:
  foreground: "#adc6ff"
  is_bold: true

octal:
  foreground: "#debcdf"

flags:
  foreground: "#c4c6d0"

control_char:
  foreground: "#ffb4ab"

broken_symlink:
  foreground: "#ffb4ab"
  is_strikethrough: true

broken_path_overlay:
  foreground: "#ffb4ab"
  is_strikethrough: true
