#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#6d5e0f" }

find_keyword  = { fg = "#43664f", bold = true, italic = true, underline = true }
find_position = { fg = "#665e40", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#4b4739", italic = true }

marker_copied   = { fg = "#6d5e0f",    bg = "#6d5e0f" }
marker_cut      = { fg = "#ba1a1a",     bg = "#ba1a1a" }
marker_marked   = { fg = "#665e40", bg = "#665e40" }
marker_selected = { fg = "#43664f",  bg = "#43664f" }
marker_symbol   = "│"

count_copied   = { fg = "#fff9ed", bg = "#6d5e0f" }
count_cut      = { fg = "#fff9ed", bg = "#ba1a1a" }
count_selected = { fg = "#fff9ed", bg = "#43664f" }

border_symbol = "│"
border_style  = { fg = "#e9e2d0" }

syntect_theme = ""

[tabs]
active   = { fg = "#fff9ed",       bg = "#6d5e0f",  bold = true }
inactive = { fg = "#4b4739", bg = "#f4eddf" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#fff9ed",       bg = "#6d5e0f",  bold = true }
normal_alt  = { fg = "#6d5e0f",   bg = "#f4eddf" }

select_main = { fg = "#fff9ed",       bg = "#43664f", bold = true }
select_alt  = { fg = "#43664f", bg = "#f4eddf" }

unset_main  = { fg = "#fff9ed",       bg = "#ba1a1a",    bold = true }
unset_alt   = { fg = "#ba1a1a",    bg = "#f4eddf" }

[indicator]
parent  = { fg = "#6d5e0f",    reversed = true }
current = { fg = "#6d5e0f",    reversed = true }
preview = { fg = "#665e40", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#f4eddf" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#e9e2d0" }
perm_type  = { fg = "#6d5e0f" }
perm_read  = { fg = "#43664f" }
perm_write = { fg = "#ba1a1a" }
perm_exec  = { fg = "#665e40" }

progress_label  = { fg = "#1e1c13",     bold = true }
progress_normal = { fg = "#6d5e0f", bg = "#e9e2d0" }
progress_error  = { fg = "#ba1a1a",  bg = "#e9e2d0" }

[which]
cols            = 3
mask            = { bg = "#f4eddf" }
cand            = { fg = "#6d5e0f" }
rest            = { fg = "#4b4739" }
desc            = { fg = "#665e40" }
separator       = "  "
separator_style = { fg = "#e9e2d0" }

[confirm]
border     = { fg = "#6d5e0f" }
title      = { fg = "#6d5e0f" }
body       = { fg = "#1e1c13" }
list       = {}
btn_yes    = { fg = "#fff9ed", bg = "#6d5e0f", bold = true }
btn_no     = { fg = "#4b4739" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#6d5e0f" }
title  = { fg = "#6d5e0f" }

tbl_col  = { fg = "#6d5e0f" }
tbl_cell = { fg = "#43664f", reversed = true }

[notify]
title_info  = { fg = "#6d5e0f" }
title_warn  = { fg = "#43664f" }
title_error = { fg = "#ba1a1a" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#6d5e0f" }
active   = { fg = "#665e40", bold = true }
inactive = { fg = "#4b4739" }

[input]
border   = { fg = "#6d5e0f" }
title    = { fg = "#1e1c13" }
value    = { fg = "#1e1c13" }
selected = { fg = "#fff9ed", bg = "#6d5e0f" }

[cmp]
border   = { fg = "#6d5e0f" }
active   = { fg = "#fff9ed", bg = "#6d5e0f" }
inactive = { fg = "#4b4739" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#6d5e0f" }
title   = { fg = "#1e1c13" }
hovered = { fg = "#665e40", bold = true }

[help]
on      = { fg = "#665e40" }
run     = { fg = "#6d5e0f" }
desc    = { fg = "#1e1c13" }
hovered = { fg = "#fff9ed", bg = "#6d5e0f", bold = true }
footer  = { fg = "#fff9ed", bg = "#6d5e0f" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#43664f" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#665e40" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#ba1a1a" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#665e40" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#e9e2d0" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#ba1a1a" },
	{ url = "*", is = "exec",                                                                                                          fg = "#6d5e0f" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#ba1a1a" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#ba1a1a" },
	{ url = "*/",                                                                                                                      fg = "#6d5e0f" },
]
