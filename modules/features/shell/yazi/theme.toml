#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#efbf6d" }

find_keyword  = { fg = "#b4cea5", bold = true, italic = true, underline = true }
find_position = { fg = "#dac3a1", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#d2c5b4", italic = true }

marker_copied   = { fg = "#efbf6d",    bg = "#efbf6d" }
marker_cut      = { fg = "#ffb4ab",     bg = "#ffb4ab" }
marker_marked   = { fg = "#dac3a1", bg = "#dac3a1" }
marker_selected = { fg = "#b4cea5",  bg = "#b4cea5" }
marker_symbol   = "│"

count_copied   = { fg = "#17130b", bg = "#efbf6d" }
count_cut      = { fg = "#17130b", bg = "#ffb4ab" }
count_selected = { fg = "#17130b", bg = "#b4cea5" }

border_symbol = "│"
border_style  = { fg = "#4e4639" }

syntect_theme = ""

[tabs]
active   = { fg = "#17130b",       bg = "#efbf6d",  bold = true }
inactive = { fg = "#d2c5b4", bg = "#241f17" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#17130b",       bg = "#efbf6d",  bold = true }
normal_alt  = { fg = "#efbf6d",   bg = "#241f17" }

select_main = { fg = "#17130b",       bg = "#b4cea5", bold = true }
select_alt  = { fg = "#b4cea5", bg = "#241f17" }

unset_main  = { fg = "#17130b",       bg = "#ffb4ab",    bold = true }
unset_alt   = { fg = "#ffb4ab",    bg = "#241f17" }

[indicator]
parent  = { fg = "#efbf6d",    reversed = true }
current = { fg = "#efbf6d",    reversed = true }
preview = { fg = "#dac3a1", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#241f17" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#4e4639" }
perm_type  = { fg = "#efbf6d" }
perm_read  = { fg = "#b4cea5" }
perm_write = { fg = "#ffb4ab" }
perm_exec  = { fg = "#dac3a1" }

progress_label  = { fg = "#ece1d4",     bold = true }
progress_normal = { fg = "#efbf6d", bg = "#4e4639" }
progress_error  = { fg = "#ffb4ab",  bg = "#4e4639" }

[which]
cols            = 3
mask            = { bg = "#241f17" }
cand            = { fg = "#efbf6d" }
rest            = { fg = "#d2c5b4" }
desc            = { fg = "#dac3a1" }
separator       = "  "
separator_style = { fg = "#4e4639" }

[confirm]
border     = { fg = "#efbf6d" }
title      = { fg = "#efbf6d" }
body       = { fg = "#ece1d4" }
list       = {}
btn_yes    = { fg = "#17130b", bg = "#efbf6d", bold = true }
btn_no     = { fg = "#d2c5b4" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#efbf6d" }
title  = { fg = "#efbf6d" }

tbl_col  = { fg = "#efbf6d" }
tbl_cell = { fg = "#b4cea5", reversed = true }

[notify]
title_info  = { fg = "#efbf6d" }
title_warn  = { fg = "#b4cea5" }
title_error = { fg = "#ffb4ab" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#efbf6d" }
active   = { fg = "#dac3a1", bold = true }
inactive = { fg = "#d2c5b4" }

[input]
border   = { fg = "#efbf6d" }
title    = { fg = "#ece1d4" }
value    = { fg = "#ece1d4" }
selected = { fg = "#17130b", bg = "#efbf6d" }

[cmp]
border   = { fg = "#efbf6d" }
active   = { fg = "#17130b", bg = "#efbf6d" }
inactive = { fg = "#d2c5b4" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#efbf6d" }
title   = { fg = "#ece1d4" }
hovered = { fg = "#dac3a1", bold = true }

[help]
on      = { fg = "#dac3a1" }
run     = { fg = "#efbf6d" }
desc    = { fg = "#ece1d4" }
hovered = { fg = "#17130b", bg = "#efbf6d", bold = true }
footer  = { fg = "#17130b", bg = "#efbf6d" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#b4cea5" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#dac3a1" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#ffb4ab" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#dac3a1" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#4e4639" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#ffb4ab" },
	{ url = "*", is = "exec",                                                                                                          fg = "#efbf6d" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#ffb4ab" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#ffb4ab" },
	{ url = "*/",                                                                                                                      fg = "#efbf6d" },
]
