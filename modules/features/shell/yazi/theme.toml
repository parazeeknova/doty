#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#f8bb71" }

find_keyword  = { fg = "#bbcd9e", bold = true, italic = true, underline = true }
find_position = { fg = "#dfc2a2", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#d4c4b5", italic = true }

marker_copied   = { fg = "#f8bb71",    bg = "#f8bb71" }
marker_cut      = { fg = "#ffb4ab",     bg = "#ffb4ab" }
marker_marked   = { fg = "#dfc2a2", bg = "#dfc2a2" }
marker_selected = { fg = "#bbcd9e",  bg = "#bbcd9e" }
marker_symbol   = "│"

count_copied   = { fg = "#18120c", bg = "#f8bb71" }
count_cut      = { fg = "#18120c", bg = "#ffb4ab" }
count_selected = { fg = "#18120c", bg = "#bbcd9e" }

border_symbol = "│"
border_style  = { fg = "#504539" }

syntect_theme = ""

[tabs]
active   = { fg = "#18120c",       bg = "#f8bb71",  bold = true }
inactive = { fg = "#d4c4b5", bg = "#251e17" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#18120c",       bg = "#f8bb71",  bold = true }
normal_alt  = { fg = "#f8bb71",   bg = "#251e17" }

select_main = { fg = "#18120c",       bg = "#bbcd9e", bold = true }
select_alt  = { fg = "#bbcd9e", bg = "#251e17" }

unset_main  = { fg = "#18120c",       bg = "#ffb4ab",    bold = true }
unset_alt   = { fg = "#ffb4ab",    bg = "#251e17" }

[indicator]
parent  = { fg = "#f8bb71",    reversed = true }
current = { fg = "#f8bb71",    reversed = true }
preview = { fg = "#dfc2a2", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#251e17" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#504539" }
perm_type  = { fg = "#f8bb71" }
perm_read  = { fg = "#bbcd9e" }
perm_write = { fg = "#ffb4ab" }
perm_exec  = { fg = "#dfc2a2" }

progress_label  = { fg = "#eee0d4",     bold = true }
progress_normal = { fg = "#f8bb71", bg = "#504539" }
progress_error  = { fg = "#ffb4ab",  bg = "#504539" }

[which]
cols            = 3
mask            = { bg = "#251e17" }
cand            = { fg = "#f8bb71" }
rest            = { fg = "#d4c4b5" }
desc            = { fg = "#dfc2a2" }
separator       = "  "
separator_style = { fg = "#504539" }

[confirm]
border     = { fg = "#f8bb71" }
title      = { fg = "#f8bb71" }
body       = { fg = "#eee0d4" }
list       = {}
btn_yes    = { fg = "#18120c", bg = "#f8bb71", bold = true }
btn_no     = { fg = "#d4c4b5" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#f8bb71" }
title  = { fg = "#f8bb71" }

tbl_col  = { fg = "#f8bb71" }
tbl_cell = { fg = "#bbcd9e", reversed = true }

[notify]
title_info  = { fg = "#f8bb71" }
title_warn  = { fg = "#bbcd9e" }
title_error = { fg = "#ffb4ab" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#f8bb71" }
active   = { fg = "#dfc2a2", bold = true }
inactive = { fg = "#d4c4b5" }

[input]
border   = { fg = "#f8bb71" }
title    = { fg = "#eee0d4" }
value    = { fg = "#eee0d4" }
selected = { fg = "#18120c", bg = "#f8bb71" }

[cmp]
border   = { fg = "#f8bb71" }
active   = { fg = "#18120c", bg = "#f8bb71" }
inactive = { fg = "#d4c4b5" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#f8bb71" }
title   = { fg = "#eee0d4" }
hovered = { fg = "#dfc2a2", bold = true }

[help]
on      = { fg = "#dfc2a2" }
run     = { fg = "#f8bb71" }
desc    = { fg = "#eee0d4" }
hovered = { fg = "#18120c", bg = "#f8bb71", bold = true }
footer  = { fg = "#18120c", bg = "#f8bb71" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#bbcd9e" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#dfc2a2" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#ffb4ab" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#dfc2a2" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#504539" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#ffb4ab" },
	{ url = "*", is = "exec",                                                                                                          fg = "#f8bb71" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#ffb4ab" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#ffb4ab" },
	{ url = "*/",                                                                                                                      fg = "#f8bb71" },
]
