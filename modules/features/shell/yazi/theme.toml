#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#adc6ff" }

find_keyword  = { fg = "#debcdf", bold = true, italic = true, underline = true }
find_position = { fg = "#bfc6dc", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#c4c6d0", italic = true }

marker_copied   = { fg = "#adc6ff",    bg = "#adc6ff" }
marker_cut      = { fg = "#ffb4ab",     bg = "#ffb4ab" }
marker_marked   = { fg = "#bfc6dc", bg = "#bfc6dc" }
marker_selected = { fg = "#debcdf",  bg = "#debcdf" }
marker_symbol   = "│"

count_copied   = { fg = "#111318", bg = "#adc6ff" }
count_cut      = { fg = "#111318", bg = "#ffb4ab" }
count_selected = { fg = "#111318", bg = "#debcdf" }

border_symbol = "│"
border_style  = { fg = "#44474f" }

syntect_theme = ""

[tabs]
active   = { fg = "#111318",       bg = "#adc6ff",  bold = true }
inactive = { fg = "#c4c6d0", bg = "#1e1f25" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#111318",       bg = "#adc6ff",  bold = true }
normal_alt  = { fg = "#adc6ff",   bg = "#1e1f25" }

select_main = { fg = "#111318",       bg = "#debcdf", bold = true }
select_alt  = { fg = "#debcdf", bg = "#1e1f25" }

unset_main  = { fg = "#111318",       bg = "#ffb4ab",    bold = true }
unset_alt   = { fg = "#ffb4ab",    bg = "#1e1f25" }

[indicator]
parent  = { fg = "#adc6ff",    reversed = true }
current = { fg = "#adc6ff",    reversed = true }
preview = { fg = "#bfc6dc", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#1e1f25" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#44474f" }
perm_type  = { fg = "#adc6ff" }
perm_read  = { fg = "#debcdf" }
perm_write = { fg = "#ffb4ab" }
perm_exec  = { fg = "#bfc6dc" }

progress_label  = { fg = "#e2e2e9",     bold = true }
progress_normal = { fg = "#adc6ff", bg = "#44474f" }
progress_error  = { fg = "#ffb4ab",  bg = "#44474f" }

[which]
cols            = 3
mask            = { bg = "#1e1f25" }
cand            = { fg = "#adc6ff" }
rest            = { fg = "#c4c6d0" }
desc            = { fg = "#bfc6dc" }
separator       = "  "
separator_style = { fg = "#44474f" }

[confirm]
border     = { fg = "#adc6ff" }
title      = { fg = "#adc6ff" }
body       = { fg = "#e2e2e9" }
list       = {}
btn_yes    = { fg = "#111318", bg = "#adc6ff", bold = true }
btn_no     = { fg = "#c4c6d0" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#adc6ff" }
title  = { fg = "#adc6ff" }

tbl_col  = { fg = "#adc6ff" }
tbl_cell = { fg = "#debcdf", reversed = true }

[notify]
title_info  = { fg = "#adc6ff" }
title_warn  = { fg = "#debcdf" }
title_error = { fg = "#ffb4ab" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#adc6ff" }
active   = { fg = "#bfc6dc", bold = true }
inactive = { fg = "#c4c6d0" }

[input]
border   = { fg = "#adc6ff" }
title    = { fg = "#e2e2e9" }
value    = { fg = "#e2e2e9" }
selected = { fg = "#111318", bg = "#adc6ff" }

[cmp]
border   = { fg = "#adc6ff" }
active   = { fg = "#111318", bg = "#adc6ff" }
inactive = { fg = "#c4c6d0" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#adc6ff" }
title   = { fg = "#e2e2e9" }
hovered = { fg = "#bfc6dc", bold = true }

[help]
on      = { fg = "#bfc6dc" }
run     = { fg = "#adc6ff" }
desc    = { fg = "#e2e2e9" }
hovered = { fg = "#111318", bg = "#adc6ff", bold = true }
footer  = { fg = "#111318", bg = "#adc6ff" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#debcdf" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#bfc6dc" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#ffb4ab" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#bfc6dc" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#44474f" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#ffb4ab" },
	{ url = "*", is = "exec",                                                                                                          fg = "#adc6ff" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#ffb4ab" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#ffb4ab" },
	{ url = "*/",                                                                                                                      fg = "#adc6ff" },
]
