# Voxtype local configuration
state_file = "auto"

[hotkey]
enabled = false

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 60

[audio.feedback]
enabled = true
theme = "default"
volume = 0.7

# Local Whisper model
[whisper]
model = "small"
language = "auto"
translate = false
on_demand_loading = true

[output]
mode = "type"
fallback_to_clipboard = true
type_delay_ms = 0

[output.notification]
on_recording_start = false
on_recording_stop = false
on_transcription = true
