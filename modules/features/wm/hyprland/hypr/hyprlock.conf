general {
    hide_cursor = true
    grace = 2
    disable_loading_bar = true
    fail_timeout = 2000
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 2
    noise = 0.02
    contrast = 1.0
    brightness = 0.85
}

input-field {
    monitor =
    size = 200, 30
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(282828)
    inner_color = rgb(1d2021)
    font_color = rgb(d5c4a1)
    check_color = rgb(a9b665)
    fail_color = rgb(cc241d)
    hide_input = false
    rounding = 10
    position = 0, 40
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I")"
    color = rgb(ebdbb2)
    font_size = 96
    font_family = FiraCode Nerd Font Bold
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgb(ebdbb2)
    font_size = 96
    font_family = FiraCode Nerd Font Bold
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%p")"
    color = rgb(ebdbb2)
    font_size = 14
    font_family = FiraCode Nerd Font
    position = 0, -75
    halign = center
    valign = center
    opacity = 0.6
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d, %Y")"
    color = rgb(ebdbb2)
    font_size = 14
    font_family = FiraCode Nerd Font
    position = 0, -110
    halign = center
    valign = center
    opacity = 0.6
}

label {
    monitor =
    text = cmd[update:5000] echo "Running $(hyprctl clients -j | jq length) applications in background"
    color = rgb(ebdbb2)
    font_size = 10
    font_family = FiraCode Nerd Font
    position = 0, 80
    halign = center
    valign = bottom
    opacity = 0.6
}
