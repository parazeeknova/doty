[custom.giturl]
description = "Display symbol for remote Git server and username"
command = """
bash -c '
rem=$(git config --get remote.origin.url 2> /dev/null)
sym="´Éê"
if echo "$rem" | grep -q "github"; then sym="´Éê";
elif echo "$rem" | grep -q "gitlab"; then sym="´èû";
elif echo "$rem" | grep -q "bitbucket"; then sym="´à▒";
elif echo "$rem" | grep -q "git"; then sym="´Şí"; fi

usr=$(awk "/user:/ {print \\$2; exit}" ~/.config/gh/hosts.yml 2>/dev/null)
if [ -z "$usr" ]; then
    usr=$(git config user.name 2>/dev/null)
fi

if [ -n "$usr" ]; then
    if [ "$usr" = "parazeeknova" ]; then
        usr="pzk"
    else
        usr=$(echo "$usr" | cut -c1-3)
    fi
    echo "$sym $usr"
else
    echo "$sym"
fi
'
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "at $output "

