#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#cbbeff" }

find_keyword  = { fg = "#eeb8cb", bold = true, italic = true, underline = true }
find_position = { fg = "#cac3dc", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#c9c4d0", italic = true }

marker_copied   = { fg = "#cbbeff",    bg = "#cbbeff" }
marker_cut      = { fg = "#ffb4ab",     bg = "#ffb4ab" }
marker_marked   = { fg = "#cac3dc", bg = "#cac3dc" }
marker_selected = { fg = "#eeb8cb",  bg = "#eeb8cb" }
marker_symbol   = "│"

count_copied   = { fg = "#141318", bg = "#cbbeff" }
count_cut      = { fg = "#141318", bg = "#ffb4ab" }
count_selected = { fg = "#141318", bg = "#eeb8cb" }

border_symbol = "│"
border_style  = { fg = "#48454e" }

syntect_theme = ""

[tabs]
active   = { fg = "#141318",       bg = "#cbbeff",  bold = true }
inactive = { fg = "#c9c4d0", bg = "#201f24" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#141318",       bg = "#cbbeff",  bold = true }
normal_alt  = { fg = "#cbbeff",   bg = "#201f24" }

select_main = { fg = "#141318",       bg = "#eeb8cb", bold = true }
select_alt  = { fg = "#eeb8cb", bg = "#201f24" }

unset_main  = { fg = "#141318",       bg = "#ffb4ab",    bold = true }
unset_alt   = { fg = "#ffb4ab",    bg = "#201f24" }

[indicator]
parent  = { fg = "#cbbeff",    reversed = true }
current = { fg = "#cbbeff",    reversed = true }
preview = { fg = "#cac3dc", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#201f24" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#48454e" }
perm_type  = { fg = "#cbbeff" }
perm_read  = { fg = "#eeb8cb" }
perm_write = { fg = "#ffb4ab" }
perm_exec  = { fg = "#cac3dc" }

progress_label  = { fg = "#e6e1e9",     bold = true }
progress_normal = { fg = "#cbbeff", bg = "#48454e" }
progress_error  = { fg = "#ffb4ab",  bg = "#48454e" }

[which]
cols            = 3
mask            = { bg = "#201f24" }
cand            = { fg = "#cbbeff" }
rest            = { fg = "#c9c4d0" }
desc            = { fg = "#cac3dc" }
separator       = "  "
separator_style = { fg = "#48454e" }

[confirm]
border     = { fg = "#cbbeff" }
title      = { fg = "#cbbeff" }
body       = { fg = "#e6e1e9" }
list       = {}
btn_yes    = { fg = "#141318", bg = "#cbbeff", bold = true }
btn_no     = { fg = "#c9c4d0" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#cbbeff" }
title  = { fg = "#cbbeff" }

tbl_col  = { fg = "#cbbeff" }
tbl_cell = { fg = "#eeb8cb", reversed = true }

[notify]
title_info  = { fg = "#cbbeff" }
title_warn  = { fg = "#eeb8cb" }
title_error = { fg = "#ffb4ab" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#cbbeff" }
active   = { fg = "#cac3dc", bold = true }
inactive = { fg = "#c9c4d0" }

[input]
border   = { fg = "#cbbeff" }
title    = { fg = "#e6e1e9" }
value    = { fg = "#e6e1e9" }
selected = { fg = "#141318", bg = "#cbbeff" }

[cmp]
border   = { fg = "#cbbeff" }
active   = { fg = "#141318", bg = "#cbbeff" }
inactive = { fg = "#c9c4d0" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#cbbeff" }
title   = { fg = "#e6e1e9" }
hovered = { fg = "#cac3dc", bold = true }

[help]
on      = { fg = "#cac3dc" }
run     = { fg = "#cbbeff" }
desc    = { fg = "#e6e1e9" }
hovered = { fg = "#141318", bg = "#cbbeff", bold = true }
footer  = { fg = "#141318", bg = "#cbbeff" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#eeb8cb" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#cac3dc" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#ffb4ab" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#cac3dc" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#48454e" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#ffb4ab" },
	{ url = "*", is = "exec",                                                                                                          fg = "#cbbeff" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#ffb4ab" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#ffb4ab" },
	{ url = "*/",                                                                                                                      fg = "#cbbeff" },
]
