#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#8cd5b4" }

find_keyword  = { fg = "#a6ccdf", bold = true, italic = true, underline = true }
find_position = { fg = "#b3ccbe", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#bfc9c2", italic = true }

marker_copied   = { fg = "#8cd5b4",    bg = "#8cd5b4" }
marker_cut      = { fg = "#ffb4ab",     bg = "#ffb4ab" }
marker_marked   = { fg = "#b3ccbe", bg = "#b3ccbe" }
marker_selected = { fg = "#a6ccdf",  bg = "#a6ccdf" }
marker_symbol   = "│"

count_copied   = { fg = "#0f1512", bg = "#8cd5b4" }
count_cut      = { fg = "#0f1512", bg = "#ffb4ab" }
count_selected = { fg = "#0f1512", bg = "#a6ccdf" }

border_symbol = "│"
border_style  = { fg = "#404944" }

syntect_theme = ""

[tabs]
active   = { fg = "#0f1512",       bg = "#8cd5b4",  bold = true }
inactive = { fg = "#bfc9c2", bg = "#1b211e" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#0f1512",       bg = "#8cd5b4",  bold = true }
normal_alt  = { fg = "#8cd5b4",   bg = "#1b211e" }

select_main = { fg = "#0f1512",       bg = "#a6ccdf", bold = true }
select_alt  = { fg = "#a6ccdf", bg = "#1b211e" }

unset_main  = { fg = "#0f1512",       bg = "#ffb4ab",    bold = true }
unset_alt   = { fg = "#ffb4ab",    bg = "#1b211e" }

[indicator]
parent  = { fg = "#8cd5b4",    reversed = true }
current = { fg = "#8cd5b4",    reversed = true }
preview = { fg = "#b3ccbe", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#1b211e" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#404944" }
perm_type  = { fg = "#8cd5b4" }
perm_read  = { fg = "#a6ccdf" }
perm_write = { fg = "#ffb4ab" }
perm_exec  = { fg = "#b3ccbe" }

progress_label  = { fg = "#dee4de",     bold = true }
progress_normal = { fg = "#8cd5b4", bg = "#404944" }
progress_error  = { fg = "#ffb4ab",  bg = "#404944" }

[which]
cols            = 3
mask            = { bg = "#1b211e" }
cand            = { fg = "#8cd5b4" }
rest            = { fg = "#bfc9c2" }
desc            = { fg = "#b3ccbe" }
separator       = "  "
separator_style = { fg = "#404944" }

[confirm]
border     = { fg = "#8cd5b4" }
title      = { fg = "#8cd5b4" }
body       = { fg = "#dee4de" }
list       = {}
btn_yes    = { fg = "#0f1512", bg = "#8cd5b4", bold = true }
btn_no     = { fg = "#bfc9c2" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#8cd5b4" }
title  = { fg = "#8cd5b4" }

tbl_col  = { fg = "#8cd5b4" }
tbl_cell = { fg = "#a6ccdf", reversed = true }

[notify]
title_info  = { fg = "#8cd5b4" }
title_warn  = { fg = "#a6ccdf" }
title_error = { fg = "#ffb4ab" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#8cd5b4" }
active   = { fg = "#b3ccbe", bold = true }
inactive = { fg = "#bfc9c2" }

[input]
border   = { fg = "#8cd5b4" }
title    = { fg = "#dee4de" }
value    = { fg = "#dee4de" }
selected = { fg = "#0f1512", bg = "#8cd5b4" }

[cmp]
border   = { fg = "#8cd5b4" }
active   = { fg = "#0f1512", bg = "#8cd5b4" }
inactive = { fg = "#bfc9c2" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#8cd5b4" }
title   = { fg = "#dee4de" }
hovered = { fg = "#b3ccbe", bold = true }

[help]
on      = { fg = "#b3ccbe" }
run     = { fg = "#8cd5b4" }
desc    = { fg = "#dee4de" }
hovered = { fg = "#0f1512", bg = "#8cd5b4", bold = true }
footer  = { fg = "#0f1512", bg = "#8cd5b4" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#a6ccdf" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#b3ccbe" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#ffb4ab" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#b3ccbe" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#404944" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#ffb4ab" },
	{ url = "*", is = "exec",                                                                                                          fg = "#8cd5b4" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#ffb4ab" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#ffb4ab" },
	{ url = "*/",                                                                                                                      fg = "#8cd5b4" },
]
