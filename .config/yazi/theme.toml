#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#abd28f" }

find_keyword  = { fg = "#a0cfcf", bold = true, italic = true, underline = true }
find_position = { fg = "#bdcbaf", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#c4c8bb", italic = true }

marker_copied   = { fg = "#abd28f",    bg = "#abd28f" }
marker_cut      = { fg = "#ffb4ab",     bg = "#ffb4ab" }
marker_marked   = { fg = "#bdcbaf", bg = "#bdcbaf" }
marker_selected = { fg = "#a0cfcf",  bg = "#a0cfcf" }
marker_symbol   = "│"

count_copied   = { fg = "#11140e", bg = "#abd28f" }
count_cut      = { fg = "#11140e", bg = "#ffb4ab" }
count_selected = { fg = "#11140e", bg = "#a0cfcf" }

border_symbol = "│"
border_style  = { fg = "#43483e" }

syntect_theme = ""

[tabs]
active   = { fg = "#11140e",       bg = "#abd28f",  bold = true }
inactive = { fg = "#c4c8bb", bg = "#1d211a" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#11140e",       bg = "#abd28f",  bold = true }
normal_alt  = { fg = "#abd28f",   bg = "#1d211a" }

select_main = { fg = "#11140e",       bg = "#a0cfcf", bold = true }
select_alt  = { fg = "#a0cfcf", bg = "#1d211a" }

unset_main  = { fg = "#11140e",       bg = "#ffb4ab",    bold = true }
unset_alt   = { fg = "#ffb4ab",    bg = "#1d211a" }

[indicator]
parent  = { fg = "#abd28f",    reversed = true }
current = { fg = "#abd28f",    reversed = true }
preview = { fg = "#bdcbaf", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#1d211a" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#43483e" }
perm_type  = { fg = "#abd28f" }
perm_read  = { fg = "#a0cfcf" }
perm_write = { fg = "#ffb4ab" }
perm_exec  = { fg = "#bdcbaf" }

progress_label  = { fg = "#e1e4d9",     bold = true }
progress_normal = { fg = "#abd28f", bg = "#43483e" }
progress_error  = { fg = "#ffb4ab",  bg = "#43483e" }

[which]
cols            = 3
mask            = { bg = "#1d211a" }
cand            = { fg = "#abd28f" }
rest            = { fg = "#c4c8bb" }
desc            = { fg = "#bdcbaf" }
separator       = "  "
separator_style = { fg = "#43483e" }

[confirm]
border     = { fg = "#abd28f" }
title      = { fg = "#abd28f" }
body       = { fg = "#e1e4d9" }
list       = {}
btn_yes    = { fg = "#11140e", bg = "#abd28f", bold = true }
btn_no     = { fg = "#c4c8bb" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#abd28f" }
title  = { fg = "#abd28f" }

tbl_col  = { fg = "#abd28f" }
tbl_cell = { fg = "#a0cfcf", reversed = true }

[notify]
title_info  = { fg = "#abd28f" }
title_warn  = { fg = "#a0cfcf" }
title_error = { fg = "#ffb4ab" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#abd28f" }
active   = { fg = "#bdcbaf", bold = true }
inactive = { fg = "#c4c8bb" }

[input]
border   = { fg = "#abd28f" }
title    = { fg = "#e1e4d9" }
value    = { fg = "#e1e4d9" }
selected = { fg = "#11140e", bg = "#abd28f" }

[cmp]
border   = { fg = "#abd28f" }
active   = { fg = "#11140e", bg = "#abd28f" }
inactive = { fg = "#c4c8bb" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#abd28f" }
title   = { fg = "#e1e4d9" }
hovered = { fg = "#bdcbaf", bold = true }

[help]
on      = { fg = "#bdcbaf" }
run     = { fg = "#abd28f" }
desc    = { fg = "#e1e4d9" }
hovered = { fg = "#11140e", bg = "#abd28f", bold = true }
footer  = { fg = "#11140e", bg = "#abd28f" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#a0cfcf" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#bdcbaf" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#ffb4ab" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#bdcbaf" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#43483e" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#ffb4ab" },
	{ url = "*", is = "exec",                                                                                                          fg = "#abd28f" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#ffb4ab" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#ffb4ab" },
	{ url = "*/",                                                                                                                      fg = "#abd28f" },
]
