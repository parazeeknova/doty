#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#a4d397" }

find_keyword  = { fg = "#a0cfd3", bold = true, italic = true, underline = true }
find_position = { fg = "#bbccb2", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#c2c8bc", italic = true }

marker_copied   = { fg = "#a4d397",    bg = "#a4d397" }
marker_cut      = { fg = "#ffb4ab",     bg = "#ffb4ab" }
marker_marked   = { fg = "#bbccb2", bg = "#bbccb2" }
marker_selected = { fg = "#a0cfd3",  bg = "#a0cfd3" }
marker_symbol   = "│"

count_copied   = { fg = "#11140f", bg = "#a4d397" }
count_cut      = { fg = "#11140f", bg = "#ffb4ab" }
count_selected = { fg = "#11140f", bg = "#a0cfd3" }

border_symbol = "│"
border_style  = { fg = "#42493f" }

syntect_theme = ""

[tabs]
active   = { fg = "#11140f",       bg = "#a4d397",  bold = true }
inactive = { fg = "#c2c8bc", bg = "#1d211b" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#11140f",       bg = "#a4d397",  bold = true }
normal_alt  = { fg = "#a4d397",   bg = "#1d211b" }

select_main = { fg = "#11140f",       bg = "#a0cfd3", bold = true }
select_alt  = { fg = "#a0cfd3", bg = "#1d211b" }

unset_main  = { fg = "#11140f",       bg = "#ffb4ab",    bold = true }
unset_alt   = { fg = "#ffb4ab",    bg = "#1d211b" }

[indicator]
parent  = { fg = "#a4d397",    reversed = true }
current = { fg = "#a4d397",    reversed = true }
preview = { fg = "#bbccb2", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#1d211b" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#42493f" }
perm_type  = { fg = "#a4d397" }
perm_read  = { fg = "#a0cfd3" }
perm_write = { fg = "#ffb4ab" }
perm_exec  = { fg = "#bbccb2" }

progress_label  = { fg = "#e0e4da",     bold = true }
progress_normal = { fg = "#a4d397", bg = "#42493f" }
progress_error  = { fg = "#ffb4ab",  bg = "#42493f" }

[which]
cols            = 3
mask            = { bg = "#1d211b" }
cand            = { fg = "#a4d397" }
rest            = { fg = "#c2c8bc" }
desc            = { fg = "#bbccb2" }
separator       = "  "
separator_style = { fg = "#42493f" }

[confirm]
border     = { fg = "#a4d397" }
title      = { fg = "#a4d397" }
body       = { fg = "#e0e4da" }
list       = {}
btn_yes    = { fg = "#11140f", bg = "#a4d397", bold = true }
btn_no     = { fg = "#c2c8bc" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#a4d397" }
title  = { fg = "#a4d397" }

tbl_col  = { fg = "#a4d397" }
tbl_cell = { fg = "#a0cfd3", reversed = true }

[notify]
title_info  = { fg = "#a4d397" }
title_warn  = { fg = "#a0cfd3" }
title_error = { fg = "#ffb4ab" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#a4d397" }
active   = { fg = "#bbccb2", bold = true }
inactive = { fg = "#c2c8bc" }

[input]
border   = { fg = "#a4d397" }
title    = { fg = "#e0e4da" }
value    = { fg = "#e0e4da" }
selected = { fg = "#11140f", bg = "#a4d397" }

[cmp]
border   = { fg = "#a4d397" }
active   = { fg = "#11140f", bg = "#a4d397" }
inactive = { fg = "#c2c8bc" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#a4d397" }
title   = { fg = "#e0e4da" }
hovered = { fg = "#bbccb2", bold = true }

[help]
on      = { fg = "#bbccb2" }
run     = { fg = "#a4d397" }
desc    = { fg = "#e0e4da" }
hovered = { fg = "#11140f", bg = "#a4d397", bold = true }
footer  = { fg = "#11140f", bg = "#a4d397" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#a0cfd3" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#bbccb2" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#ffb4ab" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#bbccb2" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#42493f" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#ffb4ab" },
	{ url = "*", is = "exec",                                                                                                          fg = "#a4d397" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#ffb4ab" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#ffb4ab" },
	{ url = "*/",                                                                                                                      fg = "#a4d397" },
]
