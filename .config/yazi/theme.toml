#:schema https://yazi-rs.github.io/schemas/theme.json
# Rendered by wabi theme_switcher from matugen colors.
# Do not edit theme.toml directly — edit theme.toml.template instead.

[flavor]
dark  = ""
light = ""

[mgr]
cwd = { fg = "#a9b665" }

find_keyword  = { fg = "#d8a657", bold = true, italic = true, underline = true }
find_position = { fg = "#7daea3", bg = "reset", bold = true, italic = true }

symlink_target = { fg = "#d5c4a1", italic = true }

marker_copied   = { fg = "#a9b665",    bg = "#a9b665" }
marker_cut      = { fg = "#cc241d",     bg = "#cc241d" }
marker_marked   = { fg = "#7daea3", bg = "#7daea3" }
marker_selected = { fg = "#d8a657",  bg = "#d8a657" }
marker_symbol   = "│"

count_copied   = { fg = "#1d2021", bg = "#a9b665" }
count_cut      = { fg = "#1d2021", bg = "#cc241d" }
count_selected = { fg = "#1d2021", bg = "#d8a657" }

border_symbol = "│"
border_style  = { fg = "#3c3836" }

syntect_theme = ""

[tabs]
active   = { fg = "#1d2021",       bg = "#a9b665",  bold = true }
inactive = { fg = "#d5c4a1", bg = "#282828" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#1d2021",       bg = "#a9b665",  bold = true }
normal_alt  = { fg = "#a9b665",   bg = "#282828" }

select_main = { fg = "#1d2021",       bg = "#d8a657", bold = true }
select_alt  = { fg = "#d8a657", bg = "#282828" }

unset_main  = { fg = "#1d2021",       bg = "#cc241d",    bold = true }
unset_alt   = { fg = "#cc241d",    bg = "#282828" }

[indicator]
parent  = { fg = "#a9b665",    reversed = true }
current = { fg = "#a9b665",    reversed = true }
preview = { fg = "#7daea3", underline = true }
padding = { open = "", close = "" }

[status]
overall   = { bg = "#282828" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "#3c3836" }
perm_type  = { fg = "#a9b665" }
perm_read  = { fg = "#d8a657" }
perm_write = { fg = "#cc241d" }
perm_exec  = { fg = "#7daea3" }

progress_label  = { fg = "#ebdbb2",     bold = true }
progress_normal = { fg = "#a9b665", bg = "#3c3836" }
progress_error  = { fg = "#cc241d",  bg = "#3c3836" }

[which]
cols            = 3
mask            = { bg = "#282828" }
cand            = { fg = "#a9b665" }
rest            = { fg = "#d5c4a1" }
desc            = { fg = "#7daea3" }
separator       = "  "
separator_style = { fg = "#3c3836" }

[confirm]
border     = { fg = "#a9b665" }
title      = { fg = "#a9b665" }
body       = { fg = "#ebdbb2" }
list       = {}
btn_yes    = { fg = "#1d2021", bg = "#a9b665", bold = true }
btn_no     = { fg = "#d5c4a1" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#a9b665" }
title  = { fg = "#a9b665" }

tbl_col  = { fg = "#a9b665" }
tbl_cell = { fg = "#d8a657", reversed = true }

[notify]
title_info  = { fg = "#a9b665" }
title_warn  = { fg = "#d8a657" }
title_error = { fg = "#cc241d" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[pick]
border   = { fg = "#a9b665" }
active   = { fg = "#7daea3", bold = true }
inactive = { fg = "#d5c4a1" }

[input]
border   = { fg = "#a9b665" }
title    = { fg = "#ebdbb2" }
value    = { fg = "#ebdbb2" }
selected = { fg = "#1d2021", bg = "#a9b665" }

[cmp]
border   = { fg = "#a9b665" }
active   = { fg = "#1d2021", bg = "#a9b665" }
inactive = { fg = "#d5c4a1" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#a9b665" }
title   = { fg = "#ebdbb2" }
hovered = { fg = "#7daea3", bold = true }

[help]
on      = { fg = "#7daea3" }
run     = { fg = "#a9b665" }
desc    = { fg = "#ebdbb2" }
hovered = { fg = "#1d2021", bg = "#a9b665", bold = true }
footer  = { fg = "#1d2021", bg = "#a9b665" }

[filetype]
rules = [
	{ mime = "image/*",                                                                                                                fg = "#d8a657" },
	{ mime = "{audio,video}/*",                                                                                                        fg = "#7daea3" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",                            fg = "#cc241d" },
	{ mime = "application/{pdf,doc,rtf}",                                                                                              fg = "#7daea3" },
	{ mime = "vfs/{absent,stale}",                                                                                                     fg = "#3c3836" },
	{ url = "*", is = "orphan",                                                                                                        bg = "#cc241d" },
	{ url = "*", is = "exec",                                                                                                          fg = "#a9b665" },
	{ url = "*", is = "dummy",                                                                                                         bg = "#cc241d" },
	{ url = "*/", is = "dummy",                                                                                                        bg = "#cc241d" },
	{ url = "*/",                                                                                                                      fg = "#a9b665" },
]
