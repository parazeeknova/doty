filekinds:
  normal:
    foreground: "#e1e4d9"
  directory:
    foreground: "#a9d292"
    is_bold: true
  symlink:
    foreground: "#bccbb0"
    is_italic: true
  pipe:
    foreground: "#c3c8bb"
  block_device:
    foreground: "#a0cfd0"
  char_device:
    foreground: "#a0cfd0"
  socket:
    foreground: "#a0cfd0"
  special:
    foreground: "#a0cfd0"
  executable:
    foreground: "#a9d292"
    is_bold: true
  mount_point:
    foreground: "#ffb4ab"
    is_bold: true

perms:
  user_read:
    foreground: "#a9d292"
  user_write:
    foreground: "#a0cfd0"
  user_execute_file:
    foreground: "#a9d292"
  user_execute_other:
    foreground: "#a9d292"
  group_read:
    foreground: "#a0cfd0"
  group_write:
    foreground: "#a0cfd0"
