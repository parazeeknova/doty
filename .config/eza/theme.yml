    foreground: "#a9d292"
    is_bold: true
  unit_byte:
    foreground: "#c3c8bb"
  unit_kilo:
    foreground: "#c3c8bb"
  unit_mega:
    foreground: "#c3c8bb"
  unit_giga:
    foreground: "#c3c8bb"
  unit_huge:
    foreground: "#c3c8bb"

users:
  user_you:
    foreground: "#a9d292"
    is_bold: true
  user_root:
    foreground: "#ffb4ab"
    is_bold: true
  user_other:
    foreground: "#e1e4d9"
  group_yours:
    foreground: "#a9d292"
  group_other:
    foreground: "#c3c8bb"
  group_root:
    foreground: "#ffb4ab"

links:
  normal:
    foreground: "#bccbb0"
  multi_link_file:
    foreground: "#bccbb0"
    is_bold: true

git:
  new:
    foreground: "#a9d292"
  modified:
    foreground: "#a0cfd0"
  deleted:
    foreground: "#ffb4ab"
  renamed:
    foreground: "#bccbb0"
  ignored:
    foreground: "#c3c8bb"
  conflicted:
    foreground: "#ffb4ab"
    is_bold: true

git_repo:
  branch_main:
    foreground: "#a9d292"
  branch_other:
    foreground: "#a0cfd0"
  git_clean:
    foreground: "#a9d292"
  git_dirty:
    foreground: "#a0cfd0"

security_context:
  none:
    foreground: "#c3c8bb"
  selinux:
    colon:
      foreground: "#c3c8bb"
    user:
      foreground: "#bccbb0"
    role:
      foreground: "#a0cfd0"
    typ:
      foreground: "#a9d292"
    range:
      foreground: "#bccbb0"

file_type:
  image:
    foreground: "#bccbb0"
    is_italic: true
  video:
    foreground: "#bccbb0"
  music:
    foreground: "#a0cfd0"
  crypto:
    foreground: "#a9d292"
  document:
    foreground: "#e1e4d9"
  compressed:
    foreground: "#ffb4ab"
  temp:
    foreground: "#c3c8bb"
  compiled:
    foreground: "#a0cfd0"
  build:
    foreground: "#a9d292"
    is_underline: true
  source:
    foreground: "#a9d292"

punctuation:
  foreground: "#c3c8bb"

date:
  foreground: "#c3c8bb"

inode:
  foreground: "#43483e"

blocks:
  foreground: "#a9d292"

header:
  foreground: "#a9d292"
  is_bold: true

octal:
  foreground: "#a0cfd0"

flags:
  foreground: "#c3c8bb"

control_char:
  foreground: "#ffb4ab"

broken_symlink:
  foreground: "#ffb4ab"
  is_strikethrough: true

broken_path_overlay:
  foreground: "#ffb4ab"
  is_strikethrough: true
