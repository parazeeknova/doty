general {
    hide_cursor = true
    grace = 2
    disable_loading_bar = true
    fail_timeout = 2000
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 1
    noise = 0.02
    contrast = 1.0
    brightness = 0.85
}

input-field {
    monitor =
    size = 200, 30
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(282828)
    inner_color = rgb(1d2021)
    font_color = rgb(d4be98)
    check_color = rgb(a9b665)
    fail_color = rgb(e67e80)
    hide_input = false
    rounding = 10
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgb(ebdbb2)
    font_size = 14
    font_family = FiraCode Nerd Font
    position = 0, 40
    halign = center
    valign = bottom
}

